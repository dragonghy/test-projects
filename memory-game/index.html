<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Card Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Game Header -->
  <header class="game-header">
    <h1>Memory Card Game</h1>

    <!-- Settings Bar: Difficulty + Theme -->
    <div class="settings-bar">
      <div class="setting-group">
        <label class="setting-label">Difficulty</label>
        <div class="btn-group" id="difficulty-selector">
          <button class="btn-option" data-value="easy">Easy</button>
          <button class="btn-option active" data-value="medium">Medium</button>
          <button class="btn-option" data-value="hard">Hard</button>
        </div>
      </div>
      <div class="setting-group">
        <label class="setting-label">Theme</label>
        <div class="btn-group" id="theme-selector">
          <button class="btn-option active" data-value="emoji">Emoji</button>
          <button class="btn-option" data-value="animals">Animals</button>
          <button class="btn-option" data-value="numbers">Numbers</button>
        </div>
      </div>
    </div>

    <!-- Game Info: Moves, Timer, Restart -->
    <div class="game-info">
      <span class="stat-badge">Moves: <span id="moves">0</span></span>
      <span class="stat-badge">Time: <span id="timer">00:00</span></span>
      <button id="restart-btn" class="restart-btn">Restart</button>
    </div>
  </header>

  <!-- Card Grid -->
  <main class="game-board">
    <div id="card-grid" class="card-grid">
      <!-- Cards are generated by JavaScript -->
    </div>
  </main>

  <!-- Victory Modal -->
  <div id="victory-modal" class="modal-overlay hidden">
    <div class="modal">
      <h2>Congratulations!</h2>
      <div class="modal-stats">
        <p>Moves: <strong id="final-moves">0</strong></p>
        <p>Time: <strong id="final-time">00:00</strong></p>
      </div>
      <div id="best-score-section" class="best-score-section hidden">
        <div class="best-score-divider"></div>
        <p class="best-label">Best Record</p>
        <p class="best-detail">Moves: <strong id="best-moves">-</strong> | Time: <strong id="best-time">-</strong></p>
      </div>
      <div id="new-best-badge" class="new-best-badge hidden">New Best!</div>
      <button id="play-again-btn" class="restart-btn">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

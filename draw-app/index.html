<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draw & Paint</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="toolbar" id="toolbar">
      <div class="toolbar-section">
        <h3 class="toolbar-title">Tools</h3>
        <div class="tool-group">
          <button class="tool-btn active" data-tool="brush" title="Brush (B)">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 19l7-7 3 3-7 7-3-3z"/>
              <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
              <path d="M2 2l7.586 7.586"/>
              <circle cx="11" cy="11" r="2"/>
            </svg>
            <span>Brush</span>
          </button>
          <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14.6 1.6c.8-.8 2-.8 2.8 0L21.4 5.6c.8.8.8 2 0 2.8L12 18"/>
              <path d="M6 12l6 6"/>
            </svg>
            <span>Eraser</span>
          </button>
          <button class="tool-btn" data-tool="fill" title="Fill (F)">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 22l1-1h3l9-9"/>
              <path d="M3 21V18L15 6l3 3L6 21H3z"/>
              <path d="M15 6l3-3 3 3-3 3"/>
              <path d="M19 13c1.5 1.5 2 3.5 2 5s-1 2-2 2-2-1-2-2 .5-3.5 2-5z"/>
            </svg>
            <span>Fill</span>
          </button>
          <button class="tool-btn" data-tool="text" title="Text (T)">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="4 7 4 4 20 4 20 7"/>
              <line x1="9.5" y1="20" x2="14.5" y2="20"/>
              <line x1="12" y1="4" x2="12" y2="20"/>
            </svg>
            <span>Text</span>
          </button>
          <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 22l1-1h3l7-7-3-3-7 7v3l-1 1z"/>
              <path d="M10 11l3-3"/>
              <circle cx="17" cy="7" r="4"/>
            </svg>
            <span>Pick</span>
          </button>
          <button class="tool-btn" data-tool="line" title="Line (L)">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="19" x2="19" y2="5"/>
            </svg>
            <span>Line</span>
          </button>
          <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
            <span>Rect</span>
          </button>
          <button class="tool-btn" data-tool="circle" title="Circle (C)">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="9"/>
            </svg>
            <span>Circle</span>
          </button>
        </div>
      </div>

      <div class="toolbar-section">
        <h3 class="toolbar-title">Color</h3>
        <div class="color-palette" id="colorPalette">
          <button class="color-swatch active" data-color="#000000" style="background:#000000" title="#000000"></button>
          <button class="color-swatch" data-color="#FFFFFF" style="background:#FFFFFF" title="#FFFFFF"></button>
          <button class="color-swatch" data-color="#FF0000" style="background:#FF0000" title="#FF0000"></button>
          <button class="color-swatch" data-color="#FF8800" style="background:#FF8800" title="#FF8800"></button>
          <button class="color-swatch" data-color="#FFDD00" style="background:#FFDD00" title="#FFDD00"></button>
          <button class="color-swatch" data-color="#00CC44" style="background:#00CC44" title="#00CC44"></button>
          <button class="color-swatch" data-color="#0088FF" style="background:#0088FF" title="#0088FF"></button>
          <button class="color-swatch" data-color="#8844FF" style="background:#8844FF" title="#8844FF"></button>
          <button class="color-swatch" data-color="#FF44AA" style="background:#FF44AA" title="#FF44AA"></button>
          <button class="color-swatch" data-color="#88CCFF" style="background:#88CCFF" title="#88CCFF"></button>
        </div>
        <div class="custom-color">
          <input type="color" id="colorPicker" value="#000000" title="Custom color">
          <label for="colorPicker">Custom</label>
        </div>
      </div>

      <div class="toolbar-section">
        <h3 class="toolbar-title">Size: <span id="sizeValue">5</span>px</h3>
        <input type="range" id="brushSize" min="1" max="50" value="5" class="size-slider">
        <div class="size-preview-container">
          <div class="size-preview" id="sizePreview"></div>
        </div>
      </div>

      <div class="toolbar-section">
        <h3 class="toolbar-title">Layers</h3>
        <div class="layer-panel" id="layerPanel">
          <div class="layer-item active" data-layer="0">
            <button class="layer-visibility" data-layer="0" title="Toggle visibility">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
            <span class="layer-name">Layer 1</span>
          </div>
          <div class="layer-item" data-layer="1">
            <button class="layer-visibility" data-layer="1" title="Toggle visibility">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
            <span class="layer-name">Layer 2</span>
          </div>
          <div class="layer-item" data-layer="2">
            <button class="layer-visibility" data-layer="2" title="Toggle visibility">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
            <span class="layer-name">Layer 3</span>
          </div>
        </div>
      </div>

      <div class="toolbar-section toolbar-actions">
        <button class="action-btn" id="undoBtn" title="Undo (Ctrl+Z)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 10h10c4.4 0 8 3.6 8 8v0"/>
            <polyline points="7 14 3 10 7 6"/>
          </svg>
          Undo
        </button>
        <button class="action-btn" id="redoBtn" title="Redo (Ctrl+Y)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10H11C6.6 10 3 13.6 3 18v0"/>
            <polyline points="17 14 21 10 17 6"/>
          </svg>
          Redo
        </button>
        <button class="action-btn" id="gridBtn" title="Toggle Grid (G)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="3" y1="15" x2="21" y2="15"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
            <line x1="15" y1="3" x2="15" y2="21"/>
          </svg>
          Grid
        </button>
        <button class="action-btn" id="fitBtn" title="Fit to Window">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 3 21 3 21 9"/>
            <polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
            <line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
          Fit
        </button>
        <button class="action-btn" id="clearBtn" title="Clear Canvas">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          Clear
        </button>
        <button class="action-btn" id="exportBtn" title="Export as PNG">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export
        </button>
      </div>

      <div class="toolbar-section zoom-display">
        <span class="toolbar-title">Zoom: <span id="zoomValue">100</span>%</span>
      </div>
    </aside>

    <main class="canvas-area" id="canvasArea">
      <div class="canvas-container" id="canvasContainer">
        <!-- Layer canvases are created dynamically by JS -->
        <canvas id="gridCanvas" class="grid-canvas"></canvas>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="clearModal" hidden>
    <div class="modal">
      <h3>Clear Canvas</h3>
      <p>Are you sure you want to clear the canvas? This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="modal-btn modal-cancel" id="clearCancel">Cancel</button>
        <button class="modal-btn modal-confirm" id="clearConfirm">Clear</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="textModal" hidden>
    <div class="modal">
      <h3>Enter Text</h3>
      <input type="text" id="textInput" class="text-input" placeholder="Type your text here..." autofocus>
      <div class="text-size-row">
        <label for="textSize">Font size:</label>
        <input type="number" id="textSize" class="text-size-input" value="24" min="8" max="200">
        <span>px</span>
      </div>
      <div class="modal-actions">
        <button class="modal-btn modal-cancel" id="textCancel">Cancel</button>
        <button class="modal-btn modal-confirm" id="textConfirm">Add Text</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Slide Presenter</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f5;
  --fg: #333;
  --toolbar-bg: #fff;
  --toolbar-border: #ddd;
  --editor-bg: #fff;
  --editor-fg: #333;
  --preview-bg: #fff;
  --nav-bg: #fafafa;
  --nav-border: #eee;
  --btn-bg: #fff;
  --btn-border: #ccc;
  --btn-hover: #eee;
  --dot-color: #ccc;
  --dot-active: #555;
  --dot-hover: #999;
  --counter-color: #888;
  --code-bg: #f0f0f0;
  --pre-bg: #282c34;
  --pre-fg: #abb2bf;
  --link-color: #0066cc;
  --quote-border: #ddd;
  --quote-fg: #666;
  --h6-color: #666;
  --font-size: 16px;
}

/* Theme: Dark */
[data-theme="dark"] {
  --bg: #1e1e1e;
  --fg: #d4d4d4;
  --toolbar-bg: #2d2d2d;
  --toolbar-border: #444;
  --editor-bg: #1e1e1e;
  --editor-fg: #d4d4d4;
  --preview-bg: #252526;
  --nav-bg: #2d2d2d;
  --nav-border: #444;
  --btn-bg: #3c3c3c;
  --btn-border: #555;
  --btn-hover: #4a4a4a;
  --dot-color: #555;
  --dot-active: #ddd;
  --dot-hover: #999;
  --counter-color: #888;
  --code-bg: #3c3c3c;
  --pre-bg: #1a1a2e;
  --pre-fg: #c5c8c6;
  --link-color: #6cb6ff;
  --quote-border: #555;
  --quote-fg: #aaa;
  --h6-color: #999;
}

/* Theme: Solarized */
[data-theme="solarized"] {
  --bg: #fdf6e3;
  --fg: #657b83;
  --toolbar-bg: #eee8d5;
  --toolbar-border: #d3cbac;
  --editor-bg: #fdf6e3;
  --editor-fg: #657b83;
  --preview-bg: #fdf6e3;
  --nav-bg: #eee8d5;
  --nav-border: #d3cbac;
  --btn-bg: #eee8d5;
  --btn-border: #c5bea0;
  --btn-hover: #e6dfca;
  --dot-color: #c5bea0;
  --dot-active: #268bd2;
  --dot-hover: #93a1a1;
  --counter-color: #93a1a1;
  --code-bg: #eee8d5;
  --pre-bg: #002b36;
  --pre-fg: #93a1a1;
  --link-color: #268bd2;
  --quote-border: #d3cbac;
  --quote-fg: #93a1a1;
  --h6-color: #93a1a1;
}

/* Theme: Terminal */
[data-theme="terminal"] {
  --bg: #0a0a0a;
  --fg: #00ff00;
  --toolbar-bg: #111;
  --toolbar-border: #333;
  --editor-bg: #0a0a0a;
  --editor-fg: #00ff00;
  --preview-bg: #0a0a0a;
  --nav-bg: #111;
  --nav-border: #333;
  --btn-bg: #1a1a1a;
  --btn-border: #333;
  --btn-hover: #2a2a2a;
  --dot-color: #333;
  --dot-active: #00ff00;
  --dot-hover: #00aa00;
  --counter-color: #00aa00;
  --code-bg: #1a1a1a;
  --pre-bg: #050505;
  --pre-fg: #00dd00;
  --link-color: #00ccff;
  --quote-border: #00aa00;
  --quote-fg: #00bb00;
  --h6-color: #00aa00;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  color: var(--fg);
}

[data-theme="terminal"] body,
[data-theme="terminal"] .editor-pane textarea {
  font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
}

/* Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--toolbar-bg);
  border-bottom: 1px solid var(--toolbar-border);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.toolbar h1 {
  font-size: 16px;
  font-weight: 600;
  margin-right: auto;
}
.toolbar button, .toolbar select {
  padding: 5px 10px;
  border: 1px solid var(--btn-border);
  border-radius: 4px;
  background: var(--btn-bg);
  color: var(--fg);
  cursor: pointer;
  font-size: 13px;
}
.toolbar button:hover, .toolbar select:hover { background: var(--btn-hover); }
.toolbar .separator {
  width: 1px;
  height: 20px;
  background: var(--btn-border);
  margin: 0 4px;
}
.font-controls {
  display: flex;
  align-items: center;
  gap: 4px;
}
.font-controls span {
  font-size: 12px;
  min-width: 30px;
  text-align: center;
}

/* Main layout */
.main {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* Editor pane */
.editor-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--toolbar-border);
  min-width: 0;
}
.editor-pane textarea {
  flex: 1;
  padding: 16px;
  border: none;
  outline: none;
  resize: none;
  font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  font-size: 14px;
  line-height: 1.6;
  background: var(--editor-bg);
  color: var(--editor-fg);
}

/* Preview pane */
.preview-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--preview-bg);
}

/* Slide display */
.slide-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
  overflow: auto;
  min-height: 0;
}
.slide-content {
  max-width: 800px;
  width: 100%;
  font-size: var(--font-size);
}

/* Navigation bar */
.nav-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 10px 16px;
  border-top: 1px solid var(--nav-border);
  background: var(--nav-bg);
  flex-shrink: 0;
}
.nav-bar button {
  width: 32px;
  height: 32px;
  border: 1px solid var(--btn-border);
  border-radius: 4px;
  background: var(--btn-bg);
  color: var(--fg);
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-bar button:hover { background: var(--btn-hover); }
.nav-bar button:disabled { opacity: 0.4; cursor: default; }

.dots {
  display: flex;
  gap: 6px;
  align-items: center;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--dot-color);
  border: none;
  cursor: pointer;
  padding: 0;
  transition: background 0.2s;
}
.dot.active { background: var(--dot-active); }
.dot:hover { background: var(--dot-hover); }

.slide-counter {
  font-size: 13px;
  color: var(--counter-color);
  min-width: 50px;
  text-align: center;
}

/* Fullscreen mode */
body.fullscreen .toolbar,
body.fullscreen .editor-pane,
body.fullscreen .nav-bar {
  display: none !important;
}
body.fullscreen .main {
  display: flex;
}
body.fullscreen .preview-pane {
  flex: 1;
}
body.fullscreen .slide-container {
  padding: 64px;
}
body.fullscreen .slide-content {
  max-width: 1000px;
}

/* Markdown rendered content styles */
.slide-content h1 { font-size: 2em; margin-bottom: 0.5em; font-weight: 700; }
.slide-content h2 { font-size: 1.6em; margin-bottom: 0.5em; font-weight: 600; }
.slide-content h3 { font-size: 1.3em; margin-bottom: 0.5em; font-weight: 600; }
.slide-content h4 { font-size: 1.1em; margin-bottom: 0.4em; font-weight: 600; }
.slide-content h5 { font-size: 1em; margin-bottom: 0.4em; font-weight: 600; }
.slide-content h6 { font-size: 0.9em; margin-bottom: 0.4em; font-weight: 600; color: var(--h6-color); }
.slide-content p { margin-bottom: 0.8em; line-height: 1.7; }
.slide-content ul, .slide-content ol { margin-bottom: 0.8em; padding-left: 1.5em; }
.slide-content li { margin-bottom: 0.3em; line-height: 1.6; }
.slide-content code {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 3px;
  font-family: 'SFMono-Regular', Consolas, monospace;
  font-size: 0.9em;
}
.slide-content pre {
  background: var(--pre-bg);
  color: var(--pre-fg);
  padding: 16px;
  border-radius: 6px;
  overflow-x: auto;
  margin-bottom: 0.8em;
}
.slide-content pre code {
  background: none;
  padding: 0;
  color: inherit;
  font-size: 0.85em;
}
.slide-content a { color: var(--link-color); text-decoration: underline; }
.slide-content img { max-width: 100%; height: auto; border-radius: 4px; }
.slide-content blockquote {
  border-left: 4px solid var(--quote-border);
  padding-left: 16px;
  color: var(--quote-fg);
  margin-bottom: 0.8em;
}
.slide-content hr {
  border: none;
  border-top: 1px solid var(--toolbar-border);
  margin: 1em 0;
}

/* Responsive design */
@media (max-width: 767px) {
  .main {
    flex-direction: column;
  }
  .editor-pane {
    flex: none;
    height: 40vh;
    border-right: none;
    border-bottom: 1px solid var(--toolbar-border);
  }
  .preview-pane {
    flex: 1;
  }
  .slide-container {
    padding: 16px;
  }
  .toolbar {
    gap: 6px;
    padding: 6px 10px;
  }
  .toolbar h1 {
    font-size: 14px;
  }
  body.fullscreen .slide-container {
    padding: 24px;
  }
}
</style>
</head>
<body>

<div class="toolbar">
  <h1>Markdown Slide Presenter</h1>
  <select id="theme-select" title="Choose theme">
    <option value="light">Light</option>
    <option value="dark">Dark</option>
    <option value="solarized">Solarized</option>
    <option value="terminal">Terminal</option>
  </select>
  <div class="separator"></div>
  <div class="font-controls">
    <button id="btn-font-down" title="Decrease font size">A-</button>
    <span id="font-size-label">16</span>
    <button id="btn-font-up" title="Increase font size">A+</button>
  </div>
  <div class="separator"></div>
  <button id="btn-export" title="Export as standalone HTML">Export</button>
  <button id="btn-fullscreen" title="Enter fullscreen (F)">Fullscreen</button>
</div>

<div class="main">
  <div class="editor-pane">
    <textarea id="editor" placeholder="Enter your Markdown here...&#10;Use --- on its own line to separate slides."></textarea>
  </div>
  <div class="preview-pane">
    <div class="slide-container">
      <div class="slide-content" id="slide-content"></div>
    </div>
    <div class="nav-bar">
      <button id="btn-prev" title="Previous slide">&larr;</button>
      <div class="dots" id="dots"></div>
      <span class="slide-counter" id="slide-counter">1 / 1</span>
      <button id="btn-next" title="Next slide">&rarr;</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // --- Markdown Parser ---
  function parseMarkdown(md) {
    var html = '';
    var lines = md.split('\n');
    var i = 0;

    while (i < lines.length) {
      var line = lines[i];

      // Code block (fenced)
      if (/^```/.test(line)) {
        var codeLines = [];
        i++;
        while (i < lines.length && !/^```/.test(lines[i])) {
          codeLines.push(lines[i]);
          i++;
        }
        i++; // skip closing ```
        var codeText = escapeHtml(codeLines.join('\n'));
        html += '<pre><code>' + codeText + '</code></pre>\n';
        continue;
      }

      // Headings
      var headingMatch = line.match(/^(#{1,6})\s+(.+)$/);
      if (headingMatch) {
        var level = headingMatch[1].length;
        html += '<h' + level + '>' + inlineFormat(headingMatch[2]) + '</h' + level + '>\n';
        i++;
        continue;
      }

      // Unordered list
      if (/^[\-\*]\s+/.test(line)) {
        html += '<ul>\n';
        while (i < lines.length && /^[\-\*]\s+/.test(lines[i])) {
          html += '<li>' + inlineFormat(lines[i].replace(/^[\-\*]\s+/, '')) + '</li>\n';
          i++;
        }
        html += '</ul>\n';
        continue;
      }

      // Ordered list
      if (/^\d+\.\s+/.test(line)) {
        html += '<ol>\n';
        while (i < lines.length && /^\d+\.\s+/.test(lines[i])) {
          html += '<li>' + inlineFormat(lines[i].replace(/^\d+\.\s+/, '')) + '</li>\n';
          i++;
        }
        html += '</ol>\n';
        continue;
      }

      // Blockquote
      if (/^>\s*/.test(line)) {
        var quoteLines = [];
        while (i < lines.length && /^>\s*/.test(lines[i])) {
          quoteLines.push(lines[i].replace(/^>\s*/, ''));
          i++;
        }
        html += '<blockquote>' + inlineFormat(quoteLines.join(' ')) + '</blockquote>\n';
        continue;
      }

      // Empty line
      if (line.trim() === '') {
        i++;
        continue;
      }

      // Paragraph
      var paraLines = [];
      while (i < lines.length && lines[i].trim() !== '' &&
             !/^#{1,6}\s/.test(lines[i]) && !/^[\-\*]\s+/.test(lines[i]) &&
             !/^\d+\.\s+/.test(lines[i]) && !/^```/.test(lines[i]) &&
             !/^>\s*/.test(lines[i])) {
        paraLines.push(lines[i]);
        i++;
      }
      html += '<p>' + inlineFormat(paraLines.join(' ')) + '</p>\n';
    }

    return html;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function inlineFormat(text) {
    text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/__([^_]+)__/g, '<strong>$1</strong>');
    text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    text = text.replace(/_([^_]+)_/g, '<em>$1</em>');
    return text;
  }

  // --- State ---
  var currentSlide = 0;
  var slides = [];
  var fontSize = 16;
  var FONT_MIN = 10;
  var FONT_MAX = 32;

  // --- DOM ---
  var editor = document.getElementById('editor');
  var slideContent = document.getElementById('slide-content');
  var dotsContainer = document.getElementById('dots');
  var slideCounter = document.getElementById('slide-counter');
  var btnPrev = document.getElementById('btn-prev');
  var btnNext = document.getElementById('btn-next');
  var btnFullscreen = document.getElementById('btn-fullscreen');
  var themeSelect = document.getElementById('theme-select');
  var btnFontUp = document.getElementById('btn-font-up');
  var btnFontDown = document.getElementById('btn-font-down');
  var fontSizeLabel = document.getElementById('font-size-label');
  var btnExport = document.getElementById('btn-export');

  // --- Default / sample content ---
  var defaultContent = '# Welcome to Markdown Slides\n\nCreate beautiful presentations with Markdown!\n\n---\n\n## How to Use\n\n- Write your content in the **editor** on the left\n- Use `---` on its own line to separate slides\n- Preview updates in **real-time** on the right\n\n---\n\n## Markdown Support\n\nYou can use:\n\n1. **Bold** and *italic* text\n2. `Inline code` and code blocks\n3. [Links](https://example.com)\n4. ![Images](https://via.placeholder.com/200x100)\n\n---\n\n## Code Blocks\n\n```\nfunction hello() {\n  console.log("Hello, slides!");\n}\n```\n\n---\n\n## Features\n\n- **4 Themes**: Light, Dark, Solarized, Terminal\n- **Font Size**: Use A+ / A- to adjust\n- **Export**: Download as standalone HTML\n- **Auto-save**: Your content is saved automatically\n- **Responsive**: Works on mobile too!\n\n---\n\n## Navigation\n\n- Use **left/right arrow keys** to navigate\n- Click the **dots** below the preview\n- Press **F** for fullscreen mode\n- Press **Escape** to exit fullscreen\n\n---\n\n# Thank You!\n\nStart editing to create your own slides.';

  // --- localStorage ---
  var STORAGE_KEY = 'md-slides-content';
  var THEME_KEY = 'md-slides-theme';
  var FONT_KEY = 'md-slides-font-size';

  function loadFromStorage() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved !== null) {
        editor.value = saved;
        return true;
      }
    } catch (e) {}
    return false;
  }

  function saveToStorage() {
    try {
      localStorage.setItem(STORAGE_KEY, editor.value);
    } catch (e) {}
  }

  function loadTheme() {
    try {
      var t = localStorage.getItem(THEME_KEY);
      if (t) {
        setTheme(t);
        return;
      }
    } catch (e) {}
    setTheme('light');
  }

  function loadFontSize() {
    try {
      var s = localStorage.getItem(FONT_KEY);
      if (s) {
        fontSize = Math.max(FONT_MIN, Math.min(FONT_MAX, parseInt(s, 10)));
        applyFontSize();
        return;
      }
    } catch (e) {}
  }

  // --- Theme ---
  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeSelect.value = theme;
    try { localStorage.setItem(THEME_KEY, theme); } catch (e) {}
  }

  themeSelect.addEventListener('change', function() {
    setTheme(themeSelect.value);
  });

  // --- Font size ---
  function applyFontSize() {
    document.documentElement.style.setProperty('--font-size', fontSize + 'px');
    fontSizeLabel.textContent = fontSize;
  }

  btnFontUp.addEventListener('click', function() {
    if (fontSize < FONT_MAX) {
      fontSize += 2;
      applyFontSize();
      try { localStorage.setItem(FONT_KEY, fontSize); } catch (e) {}
    }
  });

  btnFontDown.addEventListener('click', function() {
    if (fontSize > FONT_MIN) {
      fontSize -= 2;
      applyFontSize();
      try { localStorage.setItem(FONT_KEY, fontSize); } catch (e) {}
    }
  });

  // --- Core functions ---
  function splitSlides(md) {
    return md.split(/\n---\n/).map(function(s) { return s.trim(); });
  }

  function render() {
    slides = splitSlides(editor.value);
    if (currentSlide >= slides.length) currentSlide = slides.length - 1;
    if (currentSlide < 0) currentSlide = 0;

    slideContent.innerHTML = parseMarkdown(slides[currentSlide] || '');
    slideCounter.textContent = (currentSlide + 1) + ' / ' + slides.length;

    dotsContainer.innerHTML = '';
    for (var i = 0; i < slides.length; i++) {
      var dot = document.createElement('button');
      dot.className = 'dot' + (i === currentSlide ? ' active' : '');
      dot.setAttribute('data-index', i);
      dot.setAttribute('aria-label', 'Go to slide ' + (i + 1));
      dotsContainer.appendChild(dot);
    }

    btnPrev.disabled = currentSlide === 0;
    btnNext.disabled = currentSlide === slides.length - 1;
  }

  function goToSlide(index) {
    if (index >= 0 && index < slides.length) {
      currentSlide = index;
      render();
    }
  }

  // --- Export ---
  function exportHTML() {
    var mdContent = editor.value;
    var allSlides = splitSlides(mdContent);
    var slidesHTML = allSlides.map(function(s) { return parseMarkdown(s); });
    var currentTheme = document.documentElement.getAttribute('data-theme') || 'light';

    var exportDoc = '<!DOCTYPE html>\n<html lang="en" data-theme="' + escapeHtml(currentTheme) + '">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>Markdown Slides</title>\n<style>\n' +
      '*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n' +
      ':root { --bg:#f5f5f5;--fg:#333;--preview-bg:#fff;--btn-bg:#fff;--btn-border:#ccc;--btn-hover:#eee;--dot-color:#ccc;--dot-active:#555;--dot-hover:#999;--counter-color:#888;--code-bg:#f0f0f0;--pre-bg:#282c34;--pre-fg:#abb2bf;--link-color:#0066cc;--quote-border:#ddd;--quote-fg:#666;--h6-color:#666;--nav-bg:#fafafa;--nav-border:#eee;--toolbar-border:#ddd;--font-size:' + fontSize + 'px; }\n' +
      '[data-theme="dark"]{--bg:#1e1e1e;--fg:#d4d4d4;--preview-bg:#252526;--btn-bg:#3c3c3c;--btn-border:#555;--btn-hover:#4a4a4a;--dot-color:#555;--dot-active:#ddd;--dot-hover:#999;--counter-color:#888;--code-bg:#3c3c3c;--pre-bg:#1a1a2e;--pre-fg:#c5c8c6;--link-color:#6cb6ff;--quote-border:#555;--quote-fg:#aaa;--h6-color:#999;--nav-bg:#2d2d2d;--nav-border:#444;--toolbar-border:#444;}\n' +
      '[data-theme="solarized"]{--bg:#fdf6e3;--fg:#657b83;--preview-bg:#fdf6e3;--btn-bg:#eee8d5;--btn-border:#c5bea0;--btn-hover:#e6dfca;--dot-color:#c5bea0;--dot-active:#268bd2;--dot-hover:#93a1a1;--counter-color:#93a1a1;--code-bg:#eee8d5;--pre-bg:#002b36;--pre-fg:#93a1a1;--link-color:#268bd2;--quote-border:#d3cbac;--quote-fg:#93a1a1;--h6-color:#93a1a1;--nav-bg:#eee8d5;--nav-border:#d3cbac;--toolbar-border:#d3cbac;}\n' +
      '[data-theme="terminal"]{--bg:#0a0a0a;--fg:#00ff00;--preview-bg:#0a0a0a;--btn-bg:#1a1a1a;--btn-border:#333;--btn-hover:#2a2a2a;--dot-color:#333;--dot-active:#00ff00;--dot-hover:#00aa00;--counter-color:#00aa00;--code-bg:#1a1a1a;--pre-bg:#050505;--pre-fg:#00dd00;--link-color:#00ccff;--quote-border:#00aa00;--quote-fg:#00bb00;--h6-color:#00aa00;--nav-bg:#111;--nav-border:#333;--toolbar-border:#333;}\n' +
      'body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;height:100vh;display:flex;flex-direction:column;background:var(--bg);color:var(--fg);}\n' +
      '[data-theme="terminal"] body{font-family:"SFMono-Regular",Consolas,monospace;}\n' +
      '.slide-container{flex:1;display:flex;align-items:center;justify-content:center;padding:64px;overflow:auto;background:var(--preview-bg);}\n' +
      '.slide-content{max-width:1000px;width:100%;font-size:var(--font-size);}\n' +
      '.slide-content h1{font-size:2em;margin-bottom:.5em;font-weight:700;}\n' +
      '.slide-content h2{font-size:1.6em;margin-bottom:.5em;font-weight:600;}\n' +
      '.slide-content h3{font-size:1.3em;margin-bottom:.5em;font-weight:600;}\n' +
      '.slide-content h4{font-size:1.1em;margin-bottom:.4em;font-weight:600;}\n' +
      '.slide-content h5{font-size:1em;margin-bottom:.4em;font-weight:600;}\n' +
      '.slide-content h6{font-size:.9em;margin-bottom:.4em;font-weight:600;color:var(--h6-color);}\n' +
      '.slide-content p{margin-bottom:.8em;line-height:1.7;}\n' +
      '.slide-content ul,.slide-content ol{margin-bottom:.8em;padding-left:1.5em;}\n' +
      '.slide-content li{margin-bottom:.3em;line-height:1.6;}\n' +
      '.slide-content code{background:var(--code-bg);padding:2px 6px;border-radius:3px;font-family:"SFMono-Regular",Consolas,monospace;font-size:.9em;}\n' +
      '.slide-content pre{background:var(--pre-bg);color:var(--pre-fg);padding:16px;border-radius:6px;overflow-x:auto;margin-bottom:.8em;}\n' +
      '.slide-content pre code{background:none;padding:0;color:inherit;font-size:.85em;}\n' +
      '.slide-content a{color:var(--link-color);text-decoration:underline;}\n' +
      '.slide-content img{max-width:100%;height:auto;border-radius:4px;}\n' +
      '.slide-content blockquote{border-left:4px solid var(--quote-border);padding-left:16px;color:var(--quote-fg);margin-bottom:.8em;}\n' +
      '.nav-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 16px;border-top:1px solid var(--nav-border);background:var(--nav-bg);flex-shrink:0;}\n' +
      '.nav-bar button{width:32px;height:32px;border:1px solid var(--btn-border);border-radius:4px;background:var(--btn-bg);color:var(--fg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}\n' +
      '.nav-bar button:hover{background:var(--btn-hover);}\n' +
      '.nav-bar button:disabled{opacity:.4;cursor:default;}\n' +
      '.dots{display:flex;gap:6px;align-items:center;}\n' +
      '.dot{width:10px;height:10px;border-radius:50%;background:var(--dot-color);border:none;cursor:pointer;padding:0;transition:background .2s;}\n' +
      '.dot.active{background:var(--dot-active);}\n' +
      '.dot:hover{background:var(--dot-hover);}\n' +
      '.slide-counter{font-size:13px;color:var(--counter-color);min-width:50px;text-align:center;}\n' +
      '@media(max-width:767px){.slide-container{padding:24px;}.nav-bar{padding:8px;}}\n' +
      '</style>\n</head>\n<body>\n' +
      '<div class="slide-container"><div class="slide-content" id="slide-content"></div></div>\n' +
      '<div class="nav-bar">\n' +
      '  <button id="btn-prev">&larr;</button>\n' +
      '  <div class="dots" id="dots"></div>\n' +
      '  <span class="slide-counter" id="slide-counter">1 / 1</span>\n' +
      '  <button id="btn-next">&rarr;</button>\n' +
      '</div>\n' +
      '<script>\n(function(){\n' +
      'var slides=' + JSON.stringify(slidesHTML) + ';\n' +
      'var cur=0;\n' +
      'var sc=document.getElementById("slide-content");\n' +
      'var dots=document.getElementById("dots");\n' +
      'var counter=document.getElementById("slide-counter");\n' +
      'var bp=document.getElementById("btn-prev");\n' +
      'var bn=document.getElementById("btn-next");\n' +
      'function r(){sc.innerHTML=slides[cur]||"";counter.textContent=(cur+1)+" / "+slides.length;dots.innerHTML="";for(var i=0;i<slides.length;i++){var d=document.createElement("button");d.className="dot"+(i===cur?" active":"");d.setAttribute("data-index",i);dots.appendChild(d);}bp.disabled=cur===0;bn.disabled=cur===slides.length-1;}\n' +
      'function go(i){if(i>=0&&i<slides.length){cur=i;r();}}\n' +
      'bp.addEventListener("click",function(){go(cur-1);});\n' +
      'bn.addEventListener("click",function(){go(cur+1);});\n' +
      'dots.addEventListener("click",function(e){if(e.target.classList.contains("dot"))go(parseInt(e.target.getAttribute("data-index"),10));});\n' +
      'document.addEventListener("keydown",function(e){if(e.key==="ArrowLeft"){e.preventDefault();go(cur-1);}else if(e.key==="ArrowRight"){e.preventDefault();go(cur+1);}});\n' +
      'r();\n' +
      '})();\n</' + 'script>\n</body>\n</html>';

    var blob = new Blob([exportDoc], { type: 'text/html' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'slides.html';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  btnExport.addEventListener('click', exportHTML);

  // --- Event listeners ---
  editor.addEventListener('input', function() {
    render();
    saveToStorage();
  });

  btnPrev.addEventListener('click', function() {
    goToSlide(currentSlide - 1);
  });

  btnNext.addEventListener('click', function() {
    goToSlide(currentSlide + 1);
  });

  dotsContainer.addEventListener('click', function(e) {
    if (e.target.classList.contains('dot')) {
      goToSlide(parseInt(e.target.getAttribute('data-index'), 10));
    }
  });

  btnFullscreen.addEventListener('click', function() {
    document.body.classList.add('fullscreen');
  });

  document.addEventListener('keydown', function(e) {
    if (e.target === editor && !document.body.classList.contains('fullscreen')) {
      return;
    }

    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      goToSlide(currentSlide - 1);
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      goToSlide(currentSlide + 1);
    } else if (e.key === 'f' || e.key === 'F') {
      if (!document.body.classList.contains('fullscreen')) {
        e.preventDefault();
        document.body.classList.add('fullscreen');
      }
    } else if (e.key === 'Escape') {
      document.body.classList.remove('fullscreen');
    }
  });

  // --- Init ---
  var hasStoredContent = loadFromStorage();
  if (!hasStoredContent) {
    editor.value = defaultContent;
  }
  loadTheme();
  loadFontSize();
  applyFontSize();
  render();
})();
</script>
</body>
</html>

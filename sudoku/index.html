<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Sudoku</h1>
      <div id="timer" class="timer">00:00</div>
    </header>

    <div class="controls">
      <button id="new-game-btn" class="ctrl-btn primary-btn">New Game</button>
    </div>

    <div id="board"></div>

    <div id="number-pad"></div>

    <div class="action-bar">
      <button id="pencil-btn" class="action-btn" title="Pencil Mode">
        <span class="action-icon">&#9998;</span>
        <span class="action-label">Pencil</span>
      </button>
      <button id="undo-btn" class="action-btn" title="Undo (Ctrl+Z)">
        <span class="action-icon">&#8630;</span>
        <span class="action-label">Undo</span>
      </button>
      <button id="check-btn" class="action-btn" title="Check Solution">
        <span class="action-icon">&#10003;</span>
        <span class="action-label">Check</span>
      </button>
      <button id="solve-btn" class="action-btn" title="Reveal Solution">
        <span class="action-icon">&#9733;</span>
        <span class="action-label">Solve</span>
      </button>
    </div>

    <div id="feedback" class="feedback"></div>
  </div>

  <!-- Difficulty Selection Modal -->
  <div id="difficulty-modal" class="modal-overlay">
    <div class="modal">
      <h2>Select Difficulty</h2>
      <div class="diff-buttons">
        <button class="diff-btn" data-difficulty="easy">Easy</button>
        <button class="diff-btn" data-difficulty="medium">Medium</button>
        <button class="diff-btn" data-difficulty="hard">Hard</button>
      </div>
    </div>
  </div>

  <!-- Win Modal -->
  <div id="win-modal" class="modal-overlay">
    <div class="modal">
      <h2>Congratulations!</h2>
      <p>You solved the puzzle!</p>
      <p id="win-time" class="win-time"></p>
      <div class="win-buttons">
        <button id="win-close-btn">Close</button>
        <button id="win-newgame-btn">New Game</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
